# website settings
website:
  title: "Ben Jackman"                                # Your name
  description: "Macroeconomics, finance and data science, Sydney."   # A brief slogan (optional)
  image: img/personal_photo_fuji_crop.jpg
  
  favicon: img/hexagon-logo.svg
  
  # start of the navigation bar at the top of the website
  navbar:
    pinned: true
    logo: /img/hexagon-logo.svg
    
    # your sub-pages
    left:
      - text: "Public Work"
        href: public_work/index.qmd
      - text: "Tinkering"
        href: tinkering/index.qmd
      - text: "CV"
        href: cv/index.qmd
    
    # your social media handles
    right:
      - icon: twitter-x
        href: https://x.com/bentjackman
      - icon: linkedin
        href: https://www.linkedin.com/in/ben-t-jackman/
      - icon: envelope
        aria-label: email
        href: "mailto:ben.jackman@gmail.com"  
  
  

# Don't touch unless you know what you are doing :) ------------
  search: 
    location: navbar
    type: textbox
  page-footer: 
    left: |
      <span class="faux-block">&#169; 2026 Ben Jackman</span>
    center: |
      <span class="faux-block">Built with <a href="https://quarto.org/">Quarto</a>. Template by <a href="https://marvin-schmitt.com/">Marvin Schmitt</a>.</span>

project:
  type: website
  output-dir: docs

  preview: 
    port: 22222
    browser: true
    watch-inputs: true
    navigate: true

execute:
  freeze: true

format:
  html:
    fontsize: 1.1em
    theme: 
      - pulse
      - html/styles.scss
    toc: false
    code-link: true
    anchor-sections: true
    fig-cap-location: margin
    reference-location: margin
    footnotes-hover: true